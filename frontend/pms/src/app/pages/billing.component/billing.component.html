<div class="min-h-screen bg-gray-100 p-8">
  @if(!isEditing()){
  <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-8">

    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8">
      <h2 class="text-2xl font-semibold text-gray-800">Pending Billing Management</h2>
    </div>

    <div class="overflow-x-auto border border-gray-200 rounded-lg">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Patient Name</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Encounter Date</th>
            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          @for (billing of pendingBillingData(); track billing.encounterId) {
            <tr class="hover:bg-gray-50 transition">
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ billing.patientName }}</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-800">{{ billing.encounterDate }}</td>
              <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <button (click)="openEditBilling(billing)" class="text-blue-600 hover:text-blue-900 mr-4">Billing Details</button>
              </td>
            </tr>
          }
          @if (pendingBillingData().length === 0) {
            <tr>
              <td colspan="6" class="px-6 py-12 text-center text-gray-500 italic">No pending billings found.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
  }
  @else {
  <app-billing-review
    [billing]="currentPendingBilling"
    (save)="savePendingBilling($event)"
    (close)="closeModal()"
  ></app-billing-review>
  }
</div>
