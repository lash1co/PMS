<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">
    <div class="border-b border-gray-200 px-6 py-4 flex justify-between items-center">
      <h3 class="text-lg font-semibold text-gray-800">
        Patient {{ this.encounter.patientName }} - Encounter #{{ this.encounter.EncounterId }}
      </h3>
      <button
        (click)="onClose()"
        class="text-gray-500 hover:text-gray-700 text-xl"
        aria-label="Close"
      >
        ×
      </button>
    </div>

    <div class="border-b border-gray-200 px-6 py-4 flex justify-between items-center">
      <h4 class="text-sm text-gray-600">
        Encounter Reason: {{ this.encounter.encounterReason }}
      </h4>
    </div>

    <div class="px-6 py-4">
      @if (errorMessage()) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-md text-sm">
          {{ errorMessage() }}
        </div>
      }

      <form (ngSubmit)="onSave()" class="space-y-4">
        <div>
          <mat-form-field appearance="fill" class="w-full">
            <mat-label>Diagnosis</mat-label>
            <textarea
              id="ClinicalNotes"
              [(ngModel)]="formData().ClinicalNotes"
              [value]="formData().ClinicalNotes"
              (change)="updateFormField('ClinicalNotes', $any($event.target).value)"
              placeholder="Enter diagnosis"
              class="w-full"
              required
            ></textarea>
          </mat-form-field>
        </div>

        <div>
          <mat-form-field appearance="fill" class="w-full">
            <mat-label>Alergies</mat-label>
            <textarea
              id="Alergies"
              [(ngModel)]="formData().Alergies"
              [value]="formData().Alergies"
              (change)="updateFormField('Alergies', $any($event.target).value)"
              placeholder="Enter allergies"
              class="w-full"
              required
            ></textarea>
          </mat-form-field>
        </div>

        <div>
          <label for="Prescription" class="block text-sm font-medium text-gray-700 mb-1">
            Prescription <span class="text-red-500">*</span>
          </label>
          <textarea
            id="Prescription"
            [(ngModel)]="formData().Prescription"
            name="Prescription"
            (change)="updateFormField('Prescription', $any($event.target).value)"
            placeholder="Enter prescription details"
            rows="3"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500"
            required
          ></textarea>
        </div>
      </form>
    </div>

    <div class="border-t border-gray-200 px-6 py-4 flex gap-3 justify-end">
      <button
        (click)="onClose()"
        class="px-4 py-2 border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50 transition font-medium"
      >
        Cancel
      </button>
      <button
        (click)="onSave()"
        [disabled]="isSaving()"
        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition font-medium disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ isSaving() ? 'Saving...' : 'Save Encounter' }}
      </button>
    </div>
  </div>
</div>
