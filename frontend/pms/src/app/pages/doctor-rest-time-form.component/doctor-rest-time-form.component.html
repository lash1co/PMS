<div class="min-h-screen bg-gray-100 p-8">
  <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-8">

    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8">
      <h2 class="text-2xl font-semibold text-gray-800">Resting Times Management</h2>

      <div class="mt-4 md:mt-0 flex w-full md:w-auto items-center space-x-4">
        <button
          (click)="openCreateModal()"
          class="bg-green-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-green-700 transition whitespace-nowrap"
        >
          + New Resting Time
        </button>
      </div>
    </div>

    <div class="overflow-x-auto border border-gray-200 rounded-lg">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Start Time</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">End Time</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Reason</th>
            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let restTime of restingTimeData()" class="hover:bg-gray-50 transition">
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">#{{ restTime.id }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-800">{{ restTime.startTime }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-800">{{ restTime.endTime }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ restTime.reason }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
              <button (click)="openEditModal(restTime)" class="text-blue-600 hover:text-blue-900 mr-4">Edit</button>
              <button (click)="deleteRestTime(restTime.id)" class="text-red-600 hover:text-red-900">Delete</button>
            </td>
          </tr>
          <tr *ngIf="restingTimeData().length === 0">
            <td colspan="6" class="px-6 py-12 text-center text-gray-500 italic">No rest times found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <app-doctor-rest-time-modal
    *ngIf="showModal()"
    [restTime]="currentRestTime"
    (save)="saveRestTime($event)"
    (close)="closeModal()"
  ></app-doctor-rest-time-modal>
</div>
