<div class="min-h-screen bg-gray-100 p-8">
  <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-8">

    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8">
      <h2 class="text-2xl font-semibold text-gray-800">Users Management</h2>

      <div class="mt-4 md:mt-0 flex w-full md:w-auto items-center space-x-4">
        <button
          (click)="openCreateModal()"
          class="bg-green-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-green-700 transition whitespace-nowrap"
        >
          + New User
        </button>
      </div>
    </div>

    <div class="overflow-x-auto border border-gray-200 rounded-lg">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">UserName</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Creation Date</th>
            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let user of users()" class="hover:bg-gray-50 transition">
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">#{{ user.id }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-800">{{ user.userName }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-800">{{ user.name }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ user.email }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ user.isActive ? 'Yes' : 'No' }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ user.creationDate | date:'short' }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
              <button (click)="openEditModal(user)" class="text-blue-600 hover:text-blue-900 mr-4">Edit</button>
              <button (click)="deleteUser(user.id)" class="text-red-600 hover:text-red-900">Delete</button>
            </td>
          </tr>
          <tr *ngIf="users().length === 0">
            <td colspan="6" class="px-6 py-12 text-center text-gray-500 italic">No users found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  @if (showModal()){
    <app-user-modal
      [user]="currentUser"
      (save)="saveUser($event)"
      (close)="closeModal()"
    ></app-user-modal>
  }
</div>
