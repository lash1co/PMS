<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">
    <!-- Header -->
    <div class="border-b border-gray-200 px-6 py-4 flex justify-between items-center">
      <h3 class="text-lg font-semibold text-gray-800">
        {{ user.id ? 'Edit User' : 'Create New User' }}
      </h3>
      <button
        (click)="onClose()"
        class="text-gray-500 hover:text-gray-700 text-xl"
        aria-label="Close"
      >
        ×
      </button>
    </div>

    <!-- Content -->
    <div class="px-6 py-4">
      <!-- Error Message -->
      @if (errorMessage()) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-md text-sm">
          {{ errorMessage() }}
        </div>
      }

      <!-- Form Fields -->
      <form (ngSubmit)="onSave()" class="space-y-4">
        <!-- Username -->
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
            Username <span class="text-red-500">*</span>
          </label>
          <input
            id="username"
            type="text"
            [(ngModel)]="formData().userName"
            (change)="updateFormField('userName', $any($event.target).value)"
            placeholder="Enter username"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500"
            required
          />
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            Password <span class="text-red-500">*</span>
          </label>
          <input
            id="password"
            type="password"
            [(ngModel)]="formData().password"
            (change)="updateFormField('password', $event.target.value)"
            placeholder="Enter password"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500"
            required
          />
        </div>

        <!-- Name -->
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
            Full Name <span class="text-red-500">*</span>
          </label>
          <input
            id="name"
            type="text"
            [(ngModel)]="formData().name"
            (change)="updateFormField('name', $event.target.value)"
            placeholder="Enter full name"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500"
            required
          />
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
            Email <span class="text-red-500">*</span>
          </label>
          <input
            id="email"
            type="email"
            [(ngModel)]="formData().email"
            (change)="updateFormField('email', $event.target.value)"
            placeholder="Enter email address"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500"
            required
          />
        </div>

        <!-- Role -->
        <div>
          <label for="role" class="block text-sm font-medium text-gray-700 mb-1">
            Role <span class="text-red-500">*</span>
          </label>
          <select
            id="role"
            [(ngModel)]="formData().role"
            (change)="updateFormField('role', $any($event.target).value)"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500"
            required
          >
            <option value="">Select a role</option>
            <option value="ADMIN">Admin</option>
            <option value="BILLING">Billing</option>
            <option value="DOCTOR">Doctor</option>
            <option value="NURSE">Nurse</option>
            <option value="RECEPTIONIST">Receptionist</option>
          </select>
        </div>

        <!-- Active Status -->
        <div>
          <label for="isActive" class="flex items-center">
            <input
              id="isActive"
              type="checkbox"
              [(ngModel)]="formData().isActive"
              (change)="updateFormField('isActive', $event.target.checked)"
              class="h-4 w-4 text-blue-600 rounded"
            />
            <span class="ml-2 text-sm text-gray-700">Active</span>
          </label>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="border-t border-gray-200 px-6 py-4 flex gap-3 justify-end">
      <button
        (click)="onClose()"
        class="px-4 py-2 border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50 transition font-medium"
      >
        Cancel
      </button>
      <button
        (click)="onSave()"
        [disabled]="isSaving()"
        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition font-medium disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ isSaving() ? 'Saving...' : 'Save User' }}
      </button>
    </div>
  </div>
</div>
