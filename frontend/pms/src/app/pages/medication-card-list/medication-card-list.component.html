<div class="border-b border-gray-200 px-6 py-4 flex justify-between items-center">
  <h3 class="text-lg font-semibold text-gray-800">
    Add/Update Prescription Medication
  </h3>
  <button
    (click)="onClose()"
    class="text-gray-500 hover:text-gray-700 text-xl"
    aria-label="Close"
  >
    ×
  </button>
</div>
<div class="container responsive-grid">
  @for (medication of availableMedications; track medication.medicationCode) {
    <mat-card class="rounded-card">
      <mat-card-header>
        <mat-card-title>{{ medication.medicationCode }} - {{ medication.medicationDisplayName }}</mat-card-title>
      </mat-card-header>
      <br />
    <mat-card-content class="card_content">
      <br />
      <div class="text-sm text-gray-600 mb-2">
        <textarea
        placeholder="Dosage instructions"
        [(ngModel)]="medication.dosage"
        class="border text-input rounded-md px-3 py-2 w-full w-full mb-3 p-2"></textarea>
      </div>
      <div class="text-sm text-gray-600 mb-2">
        <label for="refils-{{medication.medicationCode}}" class="block text-sm font-medium text-gray-700 mb-1">
          Refill Quantity
        </label>
        <input
          type="text"
          inputmode="numeric"
          placeholder="Medication refill quantity"
          class="text-input border mb-3 p-2 rounded w-full"
          [(ngModel)]="medication.refils"
          numbersOnly
        />
      </div>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button
      class="bg-blue-600 text-white px-4 py-2 rounded-main-button hover: bg-blue-700"
      (click)="onSave(medication)">ADD/UPDATE</button>
    </mat-card-actions>
  </mat-card>
}
</div>
