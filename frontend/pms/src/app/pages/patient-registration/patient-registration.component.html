<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8 flex flex-col items-center">
  
  <div class="max-w-3xl w-full">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold text-gray-900">Complete Your Profile</h2>
      <p class="mt-2 text-sm text-gray-600">Please review your personal information and provide your insurance details.</p>
    </div>

    <div *ngIf="isLoading()" class="flex justify-center items-center py-12 bg-white rounded-lg shadow-sm border border-gray-200">
      <svg class="animate-spin -ml-1 mr-3 h-8 w-8 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <p class="text-gray-500 font-medium">Loading your secure profile...</p>
    </div>

    <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()" class="space-y-6" *ngIf="!isLoading()">
      
      <div formGroupName="personalInfo" class="bg-white p-8 rounded-lg shadow-sm border border-gray-200 transition-all">
        <div class="flex justify-between items-center mb-6 pb-4 border-b border-gray-100">
          <div>
            <h3 class="text-xl font-semibold text-gray-800">Personal Information</h3>
            <p *ngIf="personalInfoLocked()" class="text-xs text-gray-500 mt-1">These details were pre-filled by the clinic.</p>
          </div>
          
          <button type="button" (click)="toggleLock()" class="text-sm flex items-center px-3 py-1.5 rounded-md font-medium transition"
                  [ngClass]="personalInfoLocked() ? 'text-blue-700 bg-blue-50 hover:bg-blue-100' : 'text-gray-600 bg-gray-100 hover:bg-gray-200'">
            <svg *ngIf="personalInfoLocked()" class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
            <svg *ngIf="!personalInfoLocked()" class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path>
            </svg>
            {{ personalInfoLocked() ? 'Unlock to Edit' : 'Lock Info' }}
          </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
            <input type="text" formControlName="firstName" 
                   [ngClass]="{'bg-gray-50 text-gray-500 border-transparent': personalInfoLocked(), 'border-gray-300 focus:ring-blue-500 focus:border-blue-500 bg-white': !personalInfoLocked()}"
                   class="block w-full rounded-md shadow-sm py-2 px-3 sm:text-sm transition-colors outline-none border">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
            <input type="text" formControlName="lastName" 
                   [ngClass]="{'bg-gray-50 text-gray-500 border-transparent': personalInfoLocked(), 'border-gray-300 focus:ring-blue-500 focus:border-blue-500 bg-white': !personalInfoLocked()}"
                   class="block w-full rounded-md shadow-sm py-2 px-3 sm:text-sm transition-colors outline-none border">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Date of Birth</label>
            <input type="date" formControlName="dateOfBirth" 
                   [ngClass]="{'bg-gray-50 text-gray-500 border-transparent': personalInfoLocked(), 'border-gray-300 focus:ring-blue-500 focus:border-blue-500 bg-white': !personalInfoLocked()}"
                   class="block w-full rounded-md shadow-sm py-2 px-3 sm:text-sm transition-colors outline-none border">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
            <input type="tel" formControlName="phone" placeholder="10 digits"
                   [ngClass]="{'bg-gray-50 text-gray-500 border-transparent': personalInfoLocked(), 'border-gray-300 focus:ring-blue-500 focus:border-blue-500 bg-white': !personalInfoLocked()}"
                   class="block w-full rounded-md shadow-sm py-2 px-3 sm:text-sm transition-colors outline-none border">
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" formControlName="email" 
                   [ngClass]="{'bg-gray-50 text-gray-500 border-transparent': personalInfoLocked(), 'border-gray-300 focus:ring-blue-500 focus:border-blue-500 bg-white': !personalInfoLocked()}"
                   class="block w-full rounded-md shadow-sm py-2 px-3 sm:text-sm transition-colors outline-none border">
          </div>
        </div>
      </div>

      <div formGroupName="insuranceInfo" class="bg-white p-8 rounded-lg shadow-sm border border-gray-200 transition-all">
        <div class="flex justify-between items-center mb-6 pb-4 border-b border-gray-100">
          <div>
            <h3 class="text-xl font-semibold text-gray-800">Insurance Details</h3>
            <p *ngIf="insuranceInfoLocked()" class="text-xs text-gray-500 mt-1">Your insurance data is saved securely.</p>
          </div>

          <button type="button" (click)="toggleInsuranceLock()" class="text-sm flex items-center px-3 py-1.5 rounded-md font-medium transition"
                  [ngClass]="insuranceInfoLocked() ? 'text-blue-700 bg-blue-50 hover:bg-blue-100' : 'text-gray-600 bg-gray-100 hover:bg-gray-200'">
            <svg *ngIf="insuranceInfoLocked()" class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
            <svg *ngIf="!insuranceInfoLocked()" class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path>
            </svg>
            {{ insuranceInfoLocked() ? 'Unlock to Edit' : 'Lock Info' }}
          </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Payer Name (Provider)</label>
            <input type="text" formControlName="payerName" placeholder="e.g. Blue Cross, Aetna"
                   [ngClass]="{'bg-gray-50 text-gray-500 border-transparent': insuranceInfoLocked(), 'border-gray-300 focus:ring-blue-500 focus:border-blue-500 bg-white': !insuranceInfoLocked()}"
                   class="block w-full border rounded-md shadow-sm py-2 px-3 focus:outline-none sm:text-sm transition-colors">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Member ID</label>
            <input type="text" formControlName="memberId" 
                   [ngClass]="{'bg-gray-50 text-gray-500 border-transparent': insuranceInfoLocked(), 'border-gray-300 focus:ring-blue-500 focus:border-blue-500 bg-white': !insuranceInfoLocked()}"
                   class="block w-full border rounded-md shadow-sm py-2 px-3 focus:outline-none sm:text-sm transition-colors">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Plan Type (Optional)</label>
            <input type="text" formControlName="planType" placeholder="e.g. HMO, PPO"
                   [ngClass]="{'bg-gray-50 text-gray-500 border-transparent': insuranceInfoLocked(), 'border-gray-300 focus:ring-blue-500 focus:border-blue-500 bg-white': !insuranceInfoLocked()}"
                   class="block w-full border rounded-md shadow-sm py-2 px-3 focus:outline-none sm:text-sm transition-colors">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Relationship to Subscriber</label>
            <select formControlName="relationshipToSubscriber" 
                    [ngClass]="{'bg-gray-50 text-gray-500 border-transparent': insuranceInfoLocked(), 'border-gray-300 focus:ring-blue-500 focus:border-blue-500 bg-white': !insuranceInfoLocked()}"
                    class="block w-full border rounded-md shadow-sm py-2 px-3 focus:outline-none sm:text-sm transition-colors">
              <option value="Self">Self</option>
              <option value="Spouse">Spouse</option>
              <option value="Child">Child</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
      </div>

      <div class="flex justify-end pt-4">
        <button type="submit" 
                [disabled]="registrationForm.invalid && !registrationForm.get('personalInfo')?.disabled"
                class="w-full md:w-auto flex justify-center py-3 px-8 border border-transparent rounded-md shadow-sm text-base font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition">
          Complete Registration
        </button>
      </div>
      
    </form>
  </div>
</div>
