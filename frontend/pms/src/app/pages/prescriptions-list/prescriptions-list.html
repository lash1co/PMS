<div class="min-h-screen bg-gray-100 p-8">
  <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-8">

    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8">
      <h2 class="text-2xl font-semibold text-gray-800">Prescriptions Management</h2>

      <div class="mt-4 md:mt-0 flex w-full md:w-auto items-center space-x-4">
        <button
          (click)="openCreateModal()"
          class="bg-green-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-green-700 transition whitespace-nowrap"
        >
          + New Prescription
        </button>
      </div>
    </div>

    <div class="overflow-x-auto border border-gray-200 rounded-lg">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Doctor</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Patient</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Issue Date</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Medications</th>
            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
          </tr>
        </thead>

        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let p of prescriptions()" class="hover:bg-gray-50 transition">
            <td class="px-6 py-4 text-sm text-gray-500">#{{ p.id }}</td>
            <td class="px-6 py-4 text-sm text-gray-600">
              {{ p.doctor?.name || '—' }}
            </td>

            <td class="px-6 py-4 text-sm text-gray-600">
              {{ p.patient?.firstName }} {{ p.patient?.lastName }} 
            </td>

            <td class="px-6 py-4 text-sm text-gray-600">
              {{ p.issueDate }}
            </td>

            <td class="px-6 py-4 text-sm text-gray-800">
              <ul>
                <li *ngFor="let m of p.medications">
                  {{ m.medication?.name }} ({{ m.dosage }})
                </li>
              </ul>
            </td>

            <td class="px-6 py-4 text-right text-sm">
              <button (click)="openEditModal(p)" class="text-blue-600 mr-4">Edit</button>
              <button (click)="delete(p.id)" class="text-red-600">Delete</button>
            </td>
          </tr>

          <tr *ngIf="prescriptions().length === 0">
            <td colspan="4" class="px-6 py-12 text-center text-gray-500 italic">
              No prescriptions found.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<app-prescription-modal
  *ngIf="showModal()"
  [prescription]="selectedPrescription()"
  (close)="closeModal()"
  (saved)="load()"
></app-prescription-modal>
