<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="w-full max-w-sm bg-white rounded-lg shadow-sm border border-gray-200 p-8">
    
    <h1 class="text-xl font-semibold text-gray-800 text-center mb-6">
      PMS Login
    </h1>

    <form (ngSubmit)="onLogin()" class="space-y-4">

      <!-- Username -->
      <div>
        <label
          for="username"
          class="block text-sm font-medium text-gray-700 mb-1"
        >
          Username
        </label>

        <input
          id="username"
          type="text"
          name="username"
          [(ngModel)]="credentials.username"
          required
          class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>

      <!-- Password -->
      <div>
        <label
          for="password"
          class="block text-sm font-medium text-gray-700 mb-1"
        >
          Password
        </label>

        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="credentials.password"
          required
          class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full mt-2 rounded-md bg-blue-600 px-4 py-2 text-sm font-medium
               text-white hover:bg-blue-700 focus:outline-none focus:ring-2
               focus:ring-blue-500 focus:ring-offset-1 transition"
      >
        Sign In
      </button>

    </form>

  </div>
</div>
