<div class="min-h-screen bg-gray-100 p-8">
  <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-8">
    
    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8">
      <h2 class="text-2xl font-semibold text-gray-800">
        Patient Management
      </h2>
      
      <div class="mt-4 md:mt-0 flex w-full md:w-96">
        <input 
          type="text" 
          placeholder="Search by name or last name..." 
          [(ngModel)]="searchTerm" 
          (keyup.enter)="onSearch()"
          class="w-full rounded-l-md border border-gray-300 px-4 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500"
        >
        <button 
          (click)="onSearch()"
          class="bg-blue-600 text-white px-4 py-2 rounded-r-md text-sm font-medium hover:bg-blue-700 transition focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          Search
        </button>
      </div>
    </div>

    <div class="overflow-x-auto border border-gray-200 rounded-lg">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">First Name</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Last Name</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Phone</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
            <!-- <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th> -->
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let patient of patients" class="hover:bg-gray-50 transition">
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
              #{{ patient.id }}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-800">
              {{ patient.firstName }}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-800">
              {{ patient.lastName }}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
              {{ patient.phone }}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
              {{ patient.email || 'N/A' }}
            </td>
            <!-- <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
              <button class="text-blue-600 hover:text-blue-900 mr-4 transition">Edit</button>
              <button class="text-red-600 hover:text-red-900 transition">Delete</button>
            </td> -->
          </tr>

          <tr *ngIf="patients.length === 0">
            <td colspan="6" class="px-6 py-12 text-center text-gray-500 italic">
              No patients found matching your search.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
